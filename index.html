<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chip Order Database</title>

<style>

body{
    background:#f2f2f2;
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    max-width:420px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input[type=text],
input[type=number]{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

.checkbox-group{
    margin-top:10px;
}

.checkbox-group label{
    font-weight:normal;
    margin:8px 0;
}

.total-box{
    margin-top:20px;
    padding:12px;
    background:#f7f7f7;
    border-radius:6px;
    font-size:20px;
    font-weight:bold;
    text-align:center;
}

.green{
    color:green;
}

.red{
    color:red;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.submit-btn{
    background:#28a745;
    color:white;
}

.download-btn{
    background:#007bff;
    color:white;
}

#receipt{
    width:300px;
    background:white;
    padding:10px;
    margin:20px auto;
    font-family:monospace;
    font-size:13px;
    border:1px dashed #999;
    color:black;
}

.center{
    text-align:center;
}

.line{
    border-top:1px dashed black;
    margin:8px 0;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <h2>Chip Order</h2>

    <label>Nama / ID</label>
    <input type="text" id="customer" placeholder="Masukkan nama atau ID">

    <div class="checkbox-group">

        <label>
            <input type="checkbox" value="10000" data-label="100M">
            100M - 10rb
        </label>

        <label>
            <input type="checkbox" value="15000" data-label="200M">
            200M - 15rb
        </label>

        <label>
            <input type="checkbox" value="20000" data-label="300M">
            300M - 20rb
        </label>

        <label>
            <input type="checkbox" value="30000" data-label="500M">
            500M - 30rb
        </label>

        <label>
            <input type="checkbox" value="60000" data-label="1B">
            1B - 60rb
        </label>

    </div>

    <label>Nilai Hutang (optional)</label>
    <input type="number" id="debt" value="0">

    <div class="total-box">
        Total:
        <span id="total">0</span>
    </div>

    <button class="submit-btn" onclick="generateReceipt()">
        Submit
    </button>

    <button class="download-btn" onclick="downloadReceipt()">
        Download Report Image
    </button>

</div>

<div id="receipt" class="hidden">

    <div class="center">
        <b>CHIP RECEIPT</b><br>
        ==================
    </div>

    <div class="line"></div>

    <div id="receiptContent"></div>

    <div class="line"></div>

    <div class="center">
        Terima Kasih
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

const checkboxes = document.querySelectorAll('input[type=checkbox]');
const totalElement = document.getElementById('total');

checkboxes.forEach(cb => {
    cb.addEventListener('change', calculateTotal);
});

document.getElementById('debt').addEventListener('input', calculateTotal);

function formatNumber(num){
    return num.toLocaleString('id-ID');
}

function calculateTotal(){

    let total = 0;

    checkboxes.forEach(cb => {

        if(cb.checked){
            total += parseInt(cb.value);
        }

    });

    const debt = parseInt(document.getElementById('debt').value) || 0;

    total -= debt;

    totalElement.innerText = formatNumber(total);

    // RESET COLOR
    totalElement.classList.remove('green','red');

    // JIKA ADA HUTANG -> MERAH
    if(debt > 0){
        totalElement.classList.add('red');
    }
    // TIADA HUTANG -> HIJAU
    else{
        totalElement.classList.add('green');
    }

}

function generateReceipt(){

    const customer = document.getElementById('customer').value || '-';

    const debt = parseInt(document.getElementById('debt').value) || 0;

    let items = '';

    let subtotal = 0;

    checkboxes.forEach(cb => {

        if(cb.checked){

            const price = parseInt(cb.value);

            subtotal += price;

            items += `
            ${cb.dataset.label}
            Rp ${formatNumber(price)}
            <br>
            `;

        }

    });

    const finalTotal = subtotal - debt;

    const now = new Date();

    // WARNA TOTAL
    const totalClass = debt > 0 ? 'red' : 'green';

    // WARNA HUTANG
    const debtHTML = debt > 0
        ? `<span class="red">- Rp ${formatNumber(debt)}</span>`
        : `Rp 0`;

    const content = `

    Nama/ID : ${customer}<br>
    Tanggal : ${now.toLocaleString()}<br>

    <div class="line"></div>

    ${items}

    <div class="line"></div>

    Subtotal :
    Rp ${formatNumber(subtotal)}
    <br><br>

    Hutang :
    ${debtHTML}

    <div class="line"></div>

    TOTAL :
    <span class="${totalClass}">
    Rp ${formatNumber(finalTotal)}
    </span>

    `;

    document.getElementById('receiptContent').innerHTML = content;

    document.getElementById('receipt').classList.remove('hidden');

}

function downloadReceipt(){

    const receipt = document.getElementById('receipt');

    html2canvas(receipt).then(canvas => {

        const link = document.createElement('a');

        link.download = 'chip-report.png';

        link.href = canvas.toDataURL();

        link.click();

    });

}

calculateTotal();

</script>

</body>
</html>
