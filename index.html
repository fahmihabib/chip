<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Sistem Rekod Chips Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; background: #f5f5f5; padding: 20px; }
h2 { text-align: center; }
.box {
    background: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 10px;
}
input, select, button {
    padding: 8px;
    margin: 5px;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}
th { background: #333; color: white; }
.delete-btn {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
}
</style>
</head>
<body>

<h2>Sistem Rekod Chips Pro</h2>

<div class="box">
<h3>Tambah Transaksi</h3>

<select id="type">
    <option value="jual">Jual</option>
    <option value="beli">Beli</option>
</select>

<select id="size">
    <option value="1">1B</option>
    <option value="0.5">500M</option>
    <option value="0.3">300M</option>
    <option value="0.2">200M</option>
</select>

<input type="number" id="qty" placeholder="Kuantiti">
<input type="number" id="price" placeholder="Harga manual (optional)">

<button onclick="addData()">Submit</button>
<button onclick="deleteAll()">Delete All</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="pdfContent">

<div class="box">
<h3>Rekod</h3>
<table>
<thead>
<tr>
<th>No</th>
<th>Jenis</th>
<th>Saiz</th>
<th>Qty</th>
<th>Total Harga</th>
<th>Untung</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>
</div>

<div class="box">
<h3>Total Untung: Rp <span id="totalProfit">0</span></h3>
<h3>Total Pembelian: Rp <span id="totalBuy">0</span></h3>
<h3>Untung Bersih: Rp <span id="netProfit">0</span></h3>
</div>

</div>

<script>
let data = [];
let totalProfit = 0;
let totalBuy = 0;

const sellPrice = {
    1: 60000,
    0.5: 30000,
    0.3: 20000,
    0.2: 15000
};

const buyPricePerB = 50000;

function addData() {
    let type = document.getElementById("type").value;
    let size = parseFloat(document.getElementById("size").value);
    let qty = parseInt(document.getElementById("qty").value);
    let manualPrice = document.getElementById("price").value;

    if (!qty) {
        alert("Masukkan kuantiti!");
        return;
    }

    let pricePerUnit = manualPrice ? parseInt(manualPrice) :
        (type === "jual" ? sellPrice[size] : buyPricePerB * size);

    let totalPrice = pricePerUnit * qty;
    let cost = buyPricePerB * size * qty;
    let profit = 0;

    if (type === "jual") {
        profit = totalPrice - cost;
        totalProfit += profit;
    } else {
        totalBuy += totalPrice;
    }

    data.push({ type, size, qty, totalPrice, profit });
    renderTable();
}

function renderTable() {
    let table = document.getElementById("tableData");
    table.innerHTML = "";

    data.forEach((item, index) => {
        table.innerHTML += `
        <tr>
            <td>${index + 1}</td>
            <td>${item.type}</td>
            <td>${convertSize(item.size)}</td>
            <td>${item.qty}</td>
            <td>Rp ${item.totalPrice.toLocaleString()}</td>
            <td>${item.type === "jual" ? "Rp " + item.profit.toLocaleString() : "-"}</td>
        </tr>`;
    });

    updateSummary();
}

function deleteAll() {
    if (confirm("Padam semua rekod?")) {
        data = [];
        totalProfit = 0;
        totalBuy = 0;
        renderTable();
    }
}

function updateSummary() {
    document.getElementById("totalProfit").innerText = totalProfit.toLocaleString();
    document.getElementById("totalBuy").innerText = totalBuy.toLocaleString();
    document.getElementById("netProfit").innerText = (totalProfit - totalBuy).toLocaleString();
}

function convertSize(size) {
    if (size == 1) return "1B";
    if (size == 0.5) return "500M";
    if (size == 0.3) return "300M";
    if (size == 0.2) return "200M";
}

// 🔥 DOWNLOAD PDF
function downloadPDF() {
    let element = document.getElementById("pdfContent");

    let opt = {
        margin: 0.5,
        filename: 'rekod_chips.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
